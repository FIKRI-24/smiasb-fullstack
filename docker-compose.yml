services:
  postgres:
    image: postgres:16-alpine
    container_name: smiasb-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: smiasb_postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./smiasb/backend/database/postgresql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./smiasb/backend/database/postgresql/data.sql:/docker-entrypoint-initdb.d/02-data.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smiasb_postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
